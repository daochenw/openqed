<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <style>
    .bg { fill: #ffffff; }
    .ring { stroke: #000000; }
    @media (prefers-color-scheme: dark) {
      .bg { fill: transparent; }
      .ring { stroke: #ffffff; }
    }
  </style>
  <rect class="bg" width="100" height="100"/>
  <circle class="ring" cx="50" cy="50" r="30" fill="none" stroke-width="20"/>
</svg>
